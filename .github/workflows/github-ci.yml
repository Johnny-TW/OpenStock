name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Run ESLint
        run: pnpm lint
        working-directory: frontend

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Generate Prisma Client
        run: pnpm exec prisma generate
        working-directory: backend

      - name: Run ESLint
        run: pnpm lint
        working-directory: backend

      - name: Check formatting
        run: pnpm format
        working-directory: backend

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-lint]
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Type check
        run: pnpm exec tsc --noEmit
        working-directory: frontend

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-lint]
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Generate Prisma Client
        run: pnpm exec prisma generate
        working-directory: backend

      - name: Run unit tests
        run: pnpm test
        working-directory: backend

      - name: Run test coverage
        run: pnpm test:cov
        working-directory: backend

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-typecheck]
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_HOST: ${{ vars.NEXT_PUBLIC_API_HOST || 'http://localhost:3001' }}

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-test]
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Build
        run: pnpm build
        working-directory: backend

  # 合併保護：所有必要 job 都通過才允許合併
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - frontend-lint
      - frontend-typecheck
      - frontend-build
      - backend-lint
      - backend-test
      - backend-build
    steps:
      - name: Check all jobs
        run: |
          echo "frontend-lint: ${{ needs.frontend-lint.result }}"
          echo "frontend-typecheck: ${{ needs.frontend-typecheck.result }}"
          echo "frontend-build: ${{ needs.frontend-build.result }}"
          echo "backend-lint: ${{ needs.backend-lint.result }}"
          echo "backend-test: ${{ needs.backend-test.result }}"
          echo "backend-build: ${{ needs.backend-build.result }}"

          # skipped 也算通過（表示該模組沒變更）
          for result in \
            "${{ needs.frontend-lint.result }}" \
            "${{ needs.frontend-typecheck.result }}" \
            "${{ needs.frontend-build.result }}" \
            "${{ needs.backend-lint.result }}" \
            "${{ needs.backend-test.result }}" \
            "${{ needs.backend-build.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ CI failed"
              exit 1
            fi
          done
          echo "✅ All checks passed"
